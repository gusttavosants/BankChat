<svg width="600" height="500" viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" rx="15" fill="#0F172A"/>
  
  <!-- Nodes Style -->
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8" />
    </marker>
  </defs>

  <!-- User Entry -->
  <circle cx="300" cy="40" r="20" fill="#38BDF8" fill-opacity="0.2" stroke="#38BDF8" stroke-width="2"/>
  <text x="300" y="45" text-anchor="middle" fill="#38BDF8" font-family="sans-serif" font-size="10" font-weight="bold">USUÁRIO</text>
  <path d="M300 60V90" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Triagem Node -->
  <rect x="225" y="90" width="150" height="50" rx="10" fill="url(#nodeGrad)" stroke="#38BDF8" stroke-width="2"/>
  <text x="300" y="115" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="14" font-weight="bold">1. Triagem</text>
  <text x="300" y="132" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="9">Autenticação (CPF/Data)</text>

  <!-- Central Router Logic -->
  <path d="M300 140V180" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="240" y="180" width="120" height="30" rx="15" fill="#334155" stroke="#94A3B8" stroke-dasharray="4"/>
  <text x="300" y="199" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="10" font-style="italic">Roteador de Intenção</text>

  <!-- Routes to Specialists -->
  <path d="M240 195H100V240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300 210V240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M360 195H500V240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Câmbio Specialist -->
  <rect x="25" y="240" width="150" height="50" rx="10" fill="url(#nodeGrad)" stroke="#38BDF8" stroke-width="2"/>
  <text x="100" y="265" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="14" font-weight="bold">Câmbio</text>
  <text x="100" y="282" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="9">Cotações em tempo real</text>

  <!-- Crédito Specialist -->
  <rect x="225" y="240" width="150" height="50" rx="10" fill="url(#nodeGrad)" stroke="#38BDF8" stroke-width="2"/>
  <text x="300" y="265" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="14" font-weight="bold">Crédito</text>
  <text x="300" y="282" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="9">Limites e Aumentos</text>

  <!-- Outros Specialist Placeholder or Logic -->
  <rect x="425" y="240" width="150" height="50" rx="10" fill="url(#nodeGrad)" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2"/>
  <text x="500" y="272" text-anchor="middle" fill="#64748B" font-family="sans-serif" font-size="12">Outros Serviços</text>

  <!-- The Interview (Entrevista) loop -->
  <path d="M300 290V340" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="225" y="340" width="150" height="50" rx="10" fill="url(#nodeGrad)" stroke="#F59E0B" stroke-width="2"/>
  <text x="300" y="365" text-anchor="middle" fill="#F8FAFC" font-family="sans-serif" font-size="14" font-weight="bold">Entrevista</text>
  <text x="300" y="382" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="9">Coleta de Dados e Score</text>
  
  <!-- Back to Credit from Interview -->
  <path d="M375 365C410 365 410 265 375 265" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5" marker-end="url(#arrow)"/>
  <text x="435" y="315" fill="#F59E0B" font-family="sans-serif" font-size="9">Retorno com Score</text>

  <!-- Return to Triage (Global) -->
  <path d="M25 265C-10 265 -10 115 225 115" stroke="#64748B" stroke-width="1" stroke-dasharray="3" marker-end="url(#arrow)"/>
  <text x="40" y="180" fill="#64748B" font-family="sans-serif" font-size="8" transform="rotate(-90, 40, 180)">Voltar ao Menu</text>

  <!-- End State -->
  <path d="M100 290V440H280" stroke="#EF4444" stroke-width="2" stroke-dasharray="2" marker-end="url(#arrow)"/>
  <path d="M500 290V440H320" stroke="#EF4444" stroke-width="2" stroke-dasharray="2" marker-end="url(#arrow)"/>
  <circle cx="300" cy="440" r="20" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="2"/>
  <text x="300" y="445" text-anchor="middle" fill="#EF4444" font-family="sans-serif" font-size="10" font-weight="bold">SAÍDA</text>
</svg>
